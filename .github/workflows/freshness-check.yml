name: Catalog Freshness Check

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live catalog
        run: curl -sL https://data.medicaid.gov/data.json -o /tmp/mbes-catalog-live.json

      - name: Run incremental update
        run: |
          python scripts/catalog_clean.py /tmp/mbes-catalog-live.json \
            --existing mbes-catalog/catalog_classified.json \
            -o mbes-catalog/catalog_classified.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mbes-catalog/catalog_classified.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: catalog freshness check $(date +%Y-%m-%d)"
          git push
